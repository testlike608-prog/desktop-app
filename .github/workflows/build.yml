name: Build Flutter + Python Windows App

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Desktop App
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Python Backend ───────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Install Python dependencies + PyInstaller
        run: |
          pip install -r backend/requirements.txt
          pip install pyinstaller

      - name: Build api_server.exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name api_server `
            --paths backend `
            --hidden-import=uvicorn.logging `
            --hidden-import=uvicorn.loops `
            --hidden-import=uvicorn.loops.auto `
            --hidden-import=uvicorn.protocols `
            --hidden-import=uvicorn.protocols.http `
            --hidden-import=uvicorn.protocols.http.auto `
            --hidden-import=uvicorn.protocols.websockets `
            --hidden-import=uvicorn.protocols.websockets.auto `
            --hidden-import=uvicorn.lifespan `
            --hidden-import=uvicorn.lifespan.on `
            --hidden-import=uvicorn.lifespan.off `
            --hidden-import=anyio `
            --hidden-import=anyio._backends._asyncio `
            --hidden-import=websockets `
            --hidden-import=fastapi `
            --hidden-import=cv2 `
            --add-data "backend/config.json;." `
            backend/api_server.py
        shell: pwsh

      # ─── Flutter Frontend ─────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Flutter Windows Release
        run: flutter build windows --release

      # ─── Combine & Package ────────────────────────────────────────
      - name: Copy api_server.exe into Flutter release
        run: |
          $dest = "build\windows\x64\runner\Release"
          Copy-Item "dist\api_server.exe" -Destination $dest -Force
        shell: pwsh

      - name: Copy backend data files
        run: |
          $dest = "build\windows\x64\runner\Release"
          Copy-Item "backend\config.json"          -Destination $dest -Force -ErrorAction SilentlyContinue
          Copy-Item "backend\program_mapping.xlsx" -Destination $dest -Force -ErrorAction SilentlyContinue
          Copy-Item "backend\meeserve.ico"         -Destination $dest -Force -ErrorAction SilentlyContinue
          Copy-Item "backend\company_logo.png"     -Destination $dest -Force -ErrorAction SilentlyContinue
        shell: pwsh

      # ─── Upload Artifact ──────────────────────────────────────────
      - name: Upload Windows App
        uses: actions/upload-artifact@v4
        with:
          name: WaterDrop-Windows-App
          path: build\windows\x64\runner\Release\
          retention-days: 30
